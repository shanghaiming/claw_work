          - generic [ref=e161]:
            - text: This indicator is inspired by the concept of
            - strong [ref=e162]: Persistency
            - text: introduced by
            - strong [ref=e163]: Pradeep Bonde
            - text: . Bonde emphasizes that it's not just about knowing the direction of a trend, but also about understanding how resilient that trend is over time. Stocks that consistently move in the direction of the trend have better odds of continuing that trend. By identifying such stocks, traders can improve their chances of catching both more and bigger winners.
            - text: Bonde's original concept can be refined further by tracking how long a price has stayed in a certain trend direction relative to a key moving average. Instead of solely counting the instances where the close is higher than the previous close, this script tracks how many bars (periods) the price has stayed above or below certain moving averages. Moving averages act as dynamic support and resistance levels, providing a more nuanced view of price behavior.
            - strong [ref=e164]: Key Components
            - link "snapshot" [ref=e165] [cursor=pointer]:
              - /url: https://www.tradingview.com/x/Pf5Yay2A/
              - img "snapshot" [ref=e166]
            - list [ref=e167]:
              - listitem [ref=e168]:
                - strong [ref=e169]: Calculating Moving Averages
                - text: ": The indicator calculates up to four moving averages based on user settings. Users can choose the type (EMA or SMA), length, and color of each MA."
              - listitem [ref=e170]:
                - strong [ref=e171]: Updating Counts
                - text: ": The indicator updates counts for each MA on every bar. Counts increase when the price stays on the same side of the MA. Counts reset and change sign when the price crosses the MA."
              - listitem [ref=e172]:
                - strong [ref=e173]: Decisive Exit Logic
                - text: ": When enabled, the indicator starts a pending exit if the price meets certain conditions. A decisive exit occurs if the price reaches the stored exit level. Users can select whether to use the close price or high/low prices for pending exits."
              - listitem [ref=e174]:
                - strong [ref=e175]: Maximum Persistency
                - text: ": This tracks the longest period that the price has remained either above or below a specified moving average. For example, if you're looking at the 21-day EMA and see that the Max value is 100, this means that over the lookback period chosen, the price remained above the 21-day EMA for a maximum of 100 consecutive bars (days). This only applies to daily and higher timeframes."
              - listitem [ref=e176]:
                - strong [ref=e177]: Entry and Exit Signals
                - text: ": Entry signals are generated when the price crosses above an MA (positive count starts). Exit signals are generated when the price crosses below an MA (negative count starts). Signals are displayed as markers on the chart."
              - listitem [ref=e178]:
                - strong [ref=e179]: Table and Directional Header
                - text: ": The table displays the MAs, counts, and pending exit status. The header shows an arrow indicating the overall momentum direction based on the counts: ↑ (Up Arrow): Indicates persistent upward momentum. ↓ (Down Arrow): Indicates persistent downward momentum. → (Right Arrow): Indicates a sideways or mixed momentum."
            - strong [ref=e180]: Customization and Settings
            - link "snapshot" [ref=e181] [cursor=pointer]:
              - /url: https://www.tradingview.com/x/AbnUqZlP/
              - img "snapshot" [ref=e182]
            - strong [ref=e183]: "Moving Averages Settings:"
            - list [ref=e184]:
              - listitem [ref=e185]:
                - strong [ref=e186]: "Show MA #1 to MA #4"
                - text: ": Enable or disable each MA."
              - listitem [ref=e187]:
                - strong [ref=e188]: MA Type
                - text: ": Select between Exponential Moving Average (EMA) and Simple Moving Average (SMA)."
              - listitem [ref=e189]:
                - strong [ref=e190]: MA Length
                - text: ": Set the period for each MA (e.g., 10, 21, 50, 200)."
              - listitem [ref=e191]:
                - strong [ref=e192]: MA Color
                - text: ": Choose the color for each MA plotted on the chart."
            - strong [ref=e193]: "Exit Logic Settings:"
            - list [ref=e194]:
              - listitem [ref=e195]:
                - strong [ref=e196]: Use Decisive Exit for Count
                - text: ": Enable to use pending exits and decisive exit logic."
              - listitem [ref=e197]:
                - strong [ref=e198]: Show Pending Exit
                - text: ": Display the pending exit status in the table."
              - listitem [ref=e199]:
                - strong [ref=e200]: Price to Use for Decisive Exit
                - text: ": Choose between using the Close price or High/Low prices to trigger pending exits."
            - strong [ref=e201]: "Signal Display Settings:"
            - list [ref=e202]:
              - listitem [ref=e203]: "Show Entry/Exit Signals:"
              - listitem [ref=e204]: Toggle the display of entry and exit markers on the chart.
              - listitem [ref=e205]: Display color-coded labels in the table corresponding to each MA.
            - strong [ref=e206]: "Max persistency Settings:"
            - list [ref=e207]:
              - listitem [ref=e208]: Toggle the display of Max persistency column
              - listitem [ref=e209]: Select a lookback period for 'maximum' persistency
            - strong [ref=e210]: Understanding Decisive Exit
            - text: A decisive exit is a strategic approach to exiting a trade based on specific, predefined conditions that indicate a significant change in the trend's persistence. It's about being proactive rather than reactive.
            - link "snapshot" [ref=e211] [cursor=pointer]:
              - /url: https://www.tradingview.com/x/fH94pBr6/
              - img "snapshot" [ref=e212]
            - list [ref=e213]:
              - listitem [ref=e214]:
                - strong [ref=e215]: "Pending Exit Mechanism:"
                - text: In a positive count (price above MA), a pending exit is initiated when the price shows signs of weakening. Users can choose between using the close price or the high/low prices for triggering pending exits. When the trigger condition is met, the script stores the low of that bar as the exit level.
              - listitem [ref=e216]:
                - strong [ref=e217]: "Confirming the Decisive Exit:"
                - text: The decisive exit occurs if the price reaches or breaches the stored exit level. This confirms that the momentum has decisively shifted, prompting an exit from the trade.
              - listitem [ref=e218]:
                - strong [ref=e219]: "Immediate Re-Entry Consideration:"
                - text: After a decisive exit, the script checks for immediate conditions that might warrant entering a new position in the opposite direction. This ensures that traders don't miss potential opportunities that arise quickly after an exit.
            - strong [ref=e220]: Applications of the Indicator
            - list [ref=e221]:
              - listitem [ref=e222]:
                - strong [ref=e223]: Identifying Persistent Trends
                - text: ": Use the counts to find stocks that have consistently moved in one direction. Persistent positive counts may indicate a strong upward trend."
              - listitem [ref=e224]:
                - strong [ref=e225]: Timing Entries and Exits
                - text: ": Entry and exit signals help in timing trades based on moving average crossovers. The pending exit feature allows for more conservative exit strategies."
              - listitem [ref=e226]:
                - strong [ref=e227]: Assessing Momentum Across Time Frames
                - text: ": By configuring MAs of different lengths, you can assess momentum over various periods."
            - strong [ref=e228]: Conclusion
            - text: The Persistency with Moving Averages indicator offers a powerful way to assess and capitalize on the persistence of momentum in the markets. By combining the concept of persistent momentum with customizable moving averages and flexible exit logic, traders can enhance their strategies to identify and exploit sustained trends.
            - emphasis [ref=e229]:
              - text: "Disclaimer:"
              - text: Trading involves significant risk. This indicator is a tool to assist in analysis and should not be used as the sole basis for any trading decision. Always conduct your own research and consider consulting a financial advisor. Always consider combining this indicator with other analysis tools and risk management practices to make well-informed trading decisions.
