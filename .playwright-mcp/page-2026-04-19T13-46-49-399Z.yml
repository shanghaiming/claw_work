              - generic [ref=e153]:
                - text: "Abyan OB Wala is a TradingView indicator built around Smart Money Concepts (SMC). Here's what it does:"
                - text: Core Logic It uses a ZigZag to identify swing highs and lows, then detects Market Structure Breaks (MSB), which are moments where price breaks a prior high or low with enough momentum (controlled by the Fib Factor). This determines whether the market is in a bullish or bearish phase.
                - text: "What It Draws Once an MSB is confirmed, it automatically plots four types of zones as boxes:"
                - text: Bu-OB / Be-OB -- Bullish or Bearish Order Blocks (the last opposing candle before the move)
                - text: Bu-BB / Be-MB -- Bullish or Bearish Breaker Blocks (or Mitigation Blocks, depending on structure)
                - text: Box Management Boxes extend to the right in real time and are automatically removed if price closes beyond them (invalidation). Alerts fire when price enters any of the zones.
                - text: In short, it's an automated SMC confluence tool that marks order blocks and breaker blocks based on confirmed market structure shifts, helping traders identify high-probability reversal or continuation zones.
