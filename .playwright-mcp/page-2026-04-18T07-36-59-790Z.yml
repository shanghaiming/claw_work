              - generic [ref=e179]:
                - text: 🟠 OVERVIEW
                - text: A
                - strong [ref=e180]: multi-dimensional take-profit aid
                - text: that scores how typical the current bar looks compared to past SuperTrend pivots, so you can tell when a trend has reached favorable exit conditions.
                - text: The indicator runs a standard
                - strong [ref=e181]: SuperTrend
                - text: and records every confirmed zigzag pivot that occurs during a matching-direction run. Tops go into a
                - strong [ref=e182]: bull pool
                - text: ", bottoms into a"
                - strong [ref=e183]: bear pool
                - text: . Each pivot is stored as a set of readings across several independent axes, such as
                - emphasis [ref=e184]: relative volume
                - text: ","
                - emphasis [ref=e185]: time of day
                - text: ", and"
                - emphasis [ref=e186]: price position inside the recent range
                - text: .
                - text: On every bar, the current reading on each axis is compared to that historical pool. A
                - strong [ref=e187]: blended score from 0 to 100
                - text: tells you how closely the current conditions resemble where past pivots in the same direction have clustered. The idea is to give trend followers a data-backed sense of when to start tightening up, rather than guessing an exit or using a fixed R-multiple.
                - text: The three built-in axes were chosen deliberately to be
                - strong [ref=e188]: as uncorrelated as possible
                - text: ", each describing a different dimension of market context:"
                - strong [ref=e189]: volume
                - text: (relative volume percentile),
                - strong [ref=e190]: time
                - text: (time of day), and
                - strong [ref=e191]: price
                - text: (position in recent range). Correlated inputs would double-count the same information and distort the blended score; picking axes that describe genuinely different aspects of the market means each one contributes independent evidence, and the score reflects how many distinct dimensions are currently in agreement.
                - text: 🟠 CONCEPTS
                - list [ref=e192]:
                  - listitem [ref=e193]:
                    - strong [ref=e194]: SuperTrend
                    - text: — An ATR-based trailing stop that flips between bullish and bearish states. Controls which pool of historical pivots the script reads from.
                  - listitem [ref=e195]:
                    - strong [ref=e196]: Pivot pool
                    - text: — A rolling store of confirmed zigzag pivots, split by direction.
                    - emphasis [ref=e197]: Bull pool
                    - text: holds pivot highs that printed during bullish SuperTrend runs;
                    - emphasis [ref=e198]: bear pool
                    - text: holds pivot lows from bearish runs. Capped at
                    - strong [ref=e199]: 2000 entries per side
                    - text: .
                  - listitem [ref=e200]:
                    - strong [ref=e201]: Context axis
                    - text: — A
                    - strong [ref=e202]: 0–100
                    - text: value measured at the pivot bar. The script ships with three built-ins (
                    - emphasis [ref=e203]: relative volume percentile
                    - text: ","
                    - emphasis [ref=e204]: time of day
                    - text: ","
                    - emphasis [ref=e205]: position in recent range
                    - text: ) and one optional user-plugged signal.
                  - listitem [ref=e206]:
                    - strong [ref=e207]: Axis independence
                    - text: — The three built-in axes cover
                    - strong [ref=e208]: volume
                    - text: ","
                    - strong [ref=e209]: time
                    - text: ", and"
                    - strong [ref=e210]: price
                    - text: respectively, chosen so each describes a structurally different part of the market. Low correlation between axes keeps the blended score from being dominated by any single factor.
                  - listitem [ref=e211]:
                    - strong [ref=e212]: Conditional histogram
                    - text: — For each active axis, the script walks its pool and keeps only pivots whose bins on
                    - emphasis [ref=e213]: every other
                    - text: active axis match the current bar. The survivors are binned to form a histogram.
                  - listitem [ref=e214]:
                    - strong [ref=e215]: Axis score
                    - text: — For one axis, the count of pivots in the current bar's bin divided by the count in the histogram's tallest bin, scaled to
                    - strong [ref=e216]: 0–100
                    - text: .
                    - strong [ref=e217]: "100"
                    - text: means the current context sits in the densest part of past pivots.
                  - listitem [ref=e218]:
                    - strong [ref=e219]: Blended favourability score
                    - text: — Arithmetic mean of the active per-axis scores. This is what the gauge and table display.
                  - listitem [ref=e220]:
                    - strong [ref=e221]: Density-match scoring
                    - text: — The score measures how common the current context is among past pivots. It is
                    - strong [ref=e222]: not
                    - text: a forward probability and makes no claim about what happens next.
                - text: 🟠 FEATURES
                - list [ref=e223]:
                  - listitem [ref=e224]:
                    - strong [ref=e225]: Right-side context profiles
                    - text: — Stacked mini histograms render to the right of price, one per active axis.
                    - text: • Bar heights show how pivots in each axis's conditional pool distribute across bins.
                    - text: • A
                    - emphasis [ref=e226]: dashed vertical line
                    - text: marks the current bar's bin on that axis, so you can see at a glance where today sits against history.
                    - text: • Bar hue tracks the active SuperTrend direction.
                    - link "snapshot" [ref=e227] [cursor=pointer]:
                      - /url: https://www.tradingview.com/x/Q0vYAvJd/
                      - img "snapshot" [ref=e228]
                  - listitem [ref=e229]:
                    - strong [ref=e230]: Favourability gauge
                    - text: — A vertical gradient table in the bottom-right showing the blended score, with a chevron marking the current level.
                    - emphasis [ref=e231]: Green at the top, red at the bottom.
                    - link "snapshot" [ref=e232] [cursor=pointer]:
                      - /url: https://www.tradingview.com/x/o4JDSuCE/
                      - img "snapshot" [ref=e233]
                  - listitem [ref=e234]:
                    - strong [ref=e235]: Favourability breakdown table
                    - text: — A two-column readout of each active axis's individual score out of 100, plus a final row that classifies the blended score as
                    - strong [ref=e236]: Good
                    - text: ","
                    - strong [ref=e237]: Neutral
                    - text: ", or"
                    - strong [ref=e238]: Bad
                    - text: . Position and text size are configurable.
                    - link "snapshot" [ref=e239] [cursor=pointer]:
                      - /url: https://www.tradingview.com/x/1kBRw3iJ/
                      - img "snapshot" [ref=e240]
                  - listitem [ref=e241]:
                    - strong [ref=e242]: Bar coloring
                    - text: — Bars fade from neutral grey toward the opposing trend colour as the blended score rises toward 100, so the chart itself signals when the context is stretched.
                    - link "snapshot" [ref=e243] [cursor=pointer]:
                      - /url: https://www.tradingview.com/x/MqO0WHg7/
                      - img "snapshot" [ref=e244]
                  - listitem [ref=e245]:
                    - strong [ref=e246]: Take-profit markers
                    - text: — Small orange markers print above or below the bar when the blended score hits
                    - strong [ref=e247]: "100"
                    - text: for the active SuperTrend direction.
                    - link "snapshot" [ref=e248] [cursor=pointer]:
                      - /url: https://www.tradingview.com/x/iwMee8oo/
                      - img "snapshot" [ref=e249]
                  - listitem [ref=e250]:
                    - strong [ref=e251]: Timeframe guard
                    - text: — The time-of-day axis disables automatically on daily and higher timeframes, where the reading has no meaning, and a banner explains this so the blended score stays honest.
                  - listitem [ref=e252]:
                    - strong [ref=e253]: Multi-dimensional scoring engine
                    - text: — Four independent axes feed into a single score, each conditioned on all the others.
                    - text: • Three built-in axes can be toggled on or off individually.
                    - text: • A fourth axis accepts any plot via
                    - emphasis [ref=e254]: source input
                    - text: ", provided the series stays within"
                    - strong [ref=e255]: 0–100
                    - text: on all loaded bars.
                    - text: • An on-chart warning prints if the custom signal leaves that range, and the axis is ignored until it is corrected.
                  - listitem [ref=e256]:
                    - strong [ref=e257]: Deliberately uncorrelated built-in axes
                    - text: — Volume (
                    - emphasis [ref=e258]: relative volume percentile
                    - text: ), time (
                    - emphasis [ref=e259]: time of day
                    - text: ), and price (
                    - emphasis [ref=e260]: position in recent range
                    - text: ) cover three structurally different facets of market context. Keeping the axes independent means each one adds new information to the blend rather than reinforcing the others.
                  - listitem [ref=e261]:
                    - strong [ref=e262]: Alert conditions
                    - text: "— Six alerts are included: SuperTrend bullish flip, SuperTrend bearish flip, score peak match, and crossovers into the"
                    - emphasis [ref=e263]: Good
                    - text: ","
                    - emphasis [ref=e264]: Neutral
                    - text: ", and"
                    - emphasis [ref=e265]: Bad
                    - text: bands.
                - text: 🟠 HOW TO USE
                - list [ref=e266]:
                  - listitem [ref=e267]:
                    - strong [ref=e268]: Add the script to an intraday chart
                    - text: on a liquid instrument and let it run long enough to populate the pools. More history means more stable conditional histograms.
                  - listitem [ref=e269]:
                    - strong [ref=e270]: Let SuperTrend define the active regime.
                    - text: The script only scores in the direction of the current trend; bar coloring and take-profit markers respect that regime.
                  - listitem [ref=e271]:
                    - strong [ref=e272]: Read the gauge and breakdown table together.
                    - text: The gauge shows the blended level; the table shows which individual axes are pulling it up or down.
                  - listitem [ref=e273]:
                    - strong [ref=e274]: Use the right-side profiles as a sanity check.
                    - text: If the dashed current-bin marker is sitting on or near the tallest bar across most axes, the current context closely resembles past pivot contexts in that direction.
                  - listitem [ref=e275]:
                    - strong [ref=e276]: Treat high scores as a cue to tighten management, not as reversal signals.
                    - text: A reading of
                    - strong [ref=e277]: "100"
                    - text: means conditions match where pivots have historically clustered, not that the trend is guaranteed to end.
                  - listitem [ref=e278]:
                    - strong [ref=e279]: Adjust the zigzag pivot length
                    - text: to control how strict the pool is. Lower values admit more pivots (
                    - emphasis [ref=e280]: bigger, noisier sample
                    - text: ); higher values keep only firmer pivots (
                    - emphasis [ref=e281]: smaller, cleaner sample
                    - text: ).
                  - listitem [ref=e282]:
                    - strong [ref=e283]: Plug your own signal into the custom axis
                    - text: to test whether an existing 0–100 oscillator adds useful conditioning, such as an RSI or a normalised momentum reading. For best results, pick a signal that is
                    - emphasis [ref=e284]: not strongly correlated
                    - text: with the three built-ins, so the custom axis adds a new dimension rather than re-stating an existing one.
                    - link "snapshot" [ref=e285] [cursor=pointer]:
                      - /url: https://www.tradingview.com/x/pO1HCqP2/
                      - img "snapshot" [ref=e286]
                  - listitem [ref=e287]:
                    - strong [ref=e288]: Enable only the alerts that fit your workflow.
                    - text: The band-crossover alerts fire
                    - emphasis [ref=e289]: once per transition
                    - text: ", not on every bar inside a band."
                - text: 🟠 LIMITATIONS
                - list [ref=e290]:
                  - listitem [ref=e291]:
                    - text: The pool holds
                    - strong [ref=e292]: every
                    - text: confirmed pivot during a matching-direction run,
                    - strong [ref=e293]: not only
                    - text: pivots that ended the trend. Intermediate pullbacks sit alongside genuine terminal pivots. Raising the zigzag pivot length filters the pool further if you want a cleaner sample.
                  - listitem [ref=e294]:
                    - text: "On"
                    - emphasis [ref=e295]: strongly trending symbols
                    - text: the pool is dominated by pullback pivots rather than true terminal exits, because strong trends have many small pullbacks and only one final top or bottom. On
                    - emphasis [ref=e296]: choppy symbols
                    - text: the ratio is more balanced. Read the score with this in mind.
                  - listitem [ref=e297]:
                    - text: The blended score is a
                    - strong [ref=e298]: density-match
                    - text: measure,
                    - strong [ref=e299]: not a forward probability
                    - text: . A high reading means today's context is common among past pivots of this direction. It does not predict that the trend is about to end.
                  - listitem [ref=e300]:
                    - text: The
                    - strong [ref=e301]: time-of-day axis
                    - text: has no meaning on daily and higher timeframes and is disabled automatically on those timeframes. A warning banner confirms when this is active.
                  - listitem [ref=e302]:
                    - text: The
                    - strong [ref=e303]: custom axis
                    - text: requires a source already scaled to 0–100 on every loaded bar. Values outside that range disable the axis and surface a warning. Toggling the custom axis on a live chart starts the range check from the current bar;
                    - emphasis [ref=e304]: reload the chart to validate against full loaded history
                    - text: .
                  - listitem [ref=e305]:
                    - text: Pools are capped at
                    - strong [ref=e306]: 2000 entries per direction
                    - text: ", with the oldest entries dropped first. On very long intraday histories the effective lookback is symbol- and timeframe-dependent."
                  - listitem [ref=e307]:
                    - text: All scoring uses data up to and including the confirmation bar of each pivot; pivots themselves are detected with the standard zigzag confirmation lag, meaning the scoring population on any given bar reflects pivots confirmed at least
                    - strong [ref=e308]: zzLen
                    - text: bars earlier.
                - text: 🟠 CONCLUSION
                - strong [ref=e309]: SuperTrend Take-Profit Dimensions
                - text: combines a standard SuperTrend with a rolling pool of historical pivot contexts and scores the current bar against that pool across up to
                - strong [ref=e310]: four independent axes
                - text: spanning volume, time, and price. The output is a blended
                - strong [ref=e311]: 0–100 favourability reading
                - text: ", a per-axis breakdown, and a set of context profiles that show where past pivots have clustered. It gives trend followers a structured, data-backed way to judge when the current context matches where trends have historically given back profit, without pretending to predict the next bar."
