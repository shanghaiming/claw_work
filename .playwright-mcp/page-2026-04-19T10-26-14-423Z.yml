          - generic [ref=e162]:
            - text: ■ 特徴
            - text: ● 仮想通貨に最適化された設定
            - text: ストキャス：34 / 5 / 5
            - text: 過熱ゾーン：88 / 12
            - text: 👉 張り付きやすい相場でもダマシを軽減
            - text: ● トレンドフィルター搭載（EMA）
            - text: 上昇トレンド → 買いのみ
            - text: 下降トレンド → 売りのみ
            - text: 👉 無駄な逆張りを排除
            - text: ● 視覚的に分かりやすい設計
            - text: "%K（勢い）と%D（平均）を同時表示"
            - text: 背景色でトレンド方向を表示
            - text: OB/OSゾーンを色で強調
            - text: ■ 売買ロジック
            - text: 🟢 BUY（買い）
            - text: 価格がEMAの上（上昇トレンド）
            - text: ストキャスが売られすぎ圏（12以下）
            - text: "%K が %D を上抜け（ゴールデンクロス）"
            - text: 👉 押し目からの上昇狙い
            - text: 🔴 SELL（売り）
            - text: 価格がEMAの下（下降トレンド）
            - text: ストキャスが買われすぎ圏（88以上）
            - text: "%K が %D を下抜け（デッドクロス）"
            - text: 👉 戻り売り or 反落狙い
            - text: 🔵 R（リスタート）
            - text: 上昇中：50ラインを上抜け
            - text: 下降中：50ラインを下抜け
            - text: 👉 トレンド再加速のサイン
            - text: ■ 使い方
            - text: ● トレンド相場
            - text: BUYサイン → 順張りエントリー
            - text: Rサイン → 追加エントリー
            - text: ● レンジ相場
            - text: OB/OSゾーンでの反転を参考にする
            - text: （ただしトレンドフィルターON推奨）
            - text: ■ このインジの強み
            - text: 仮想通貨特有の張り付き相場に対応
            - text: トレンド方向のみで精度を向上
            - text: ノイズを減らしたシンプルな判断
            - text: 初心者でも使いやすい視覚設計
            - text: ■ 向いている人
            - text: 押し目・戻りを狙う人
            - text: BTC・ETHトレードしている人
            - text: ストキャスを実戦レベルで使いたい人
            - text: ■ 一言でいうと
            - text: 👉 「仮想通貨用にチューニングされた順張りストキャス」
