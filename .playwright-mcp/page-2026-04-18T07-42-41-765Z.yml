          - generic [ref=e151]:
            - text: The
            - strong [ref=e152]: Predictive Monte Carlo Engine
            - text: tool
            - emphasis [ref=e153]: is a high-performance forecasting suite that uses probabilistic simulations to project future price paths based on historical volatility and market regimes.
            - text: 🔶
            - strong [ref=e154]: USAGE
            - text: The indicator generates hundreds of potential price paths starting from the current bar (or an anchored point) to visualize the most likely price distribution over a user-defined projection length. It serves as a powerful volatility and support/resistance mapping tool, providing traders with an "expected value" range rather than a single fixed forecast.
            - text: Users can choose between three distinct mathematical methods to generate these paths, apply regime filters to isolate specific market conditions, and utilize a real-time dashboard that renders a visual "forecasted candle" for the next period.
            - text: 🔹
            - strong [ref=e155]: Anchor Mode
            - text: By default, the simulation recalculates and updates on every new bar. By enabling
            - strong [ref=e156]: Anchor Mode
            - text: ", users can lock the projection starting point. The engine will then only update every X bars (e.g., every 100 bars). This allows traders to observe how price actually reacted against historical Monte Carlo projections and Support/Resistance levels as the chart progresses."
            - text: 🔶
            - strong [ref=e157]: DETAILS
            - text: "The engine utilizes three primary simulation methodologies:"
            - list [ref=e158]:
              - listitem [ref=e159]:
                - strong [ref=e160]: "Geometric Brownian Motion (GBM):"
                - text: A stochastic process that assumes returns follow a log-normal distribution. This is the industry standard for modeling asset prices, ensuring prices remain positive and incorporating both drift and volatility.
              - listitem [ref=e161]:
                - strong [ref=e162]: "Simple Random Walk (SRW):"
                - text: A basic additive model where price changes are sampled from a normal distribution based on historical mean and standard deviation.
              - listitem [ref=e163]:
                - strong [ref=e164]: "Historical Shuffle (Bootstrapping):"
                - text: Instead of using random numbers, this method randomly samples actual historical price returns from the lookback period. This preserves the "fat tails" and unique characteristics of the specific asset being traded.
            - text: 🔹
            - strong [ref=e165]: Regime Filtering
            - text: To improve accuracy, the engine can filter the historical data used for simulations. If "Trend" or "Momentum" regimes are selected, the indicator only calculates volatility and drift from past bars that match the current market environment (e.g., only using data from previous uptrends to forecast a current uptrend).
            - text: 🔹
            - strong [ref=e166]: Fading S/R Zones
            - text: "The tool identifies four key levels based on the simulation distribution: Max, R1 (90th percentile), S1 (10th percentile), and Min. These are rendered as horizontal zones that feature a unique horizontal gradient, fading as they extend into the future to represent the increasing uncertainty of the projection over time."
            - text: 🔶
            - strong [ref=e167]: SETTINGS
            - text: 🔹
            - strong [ref=e168]: Monte Carlo Settings
            - list [ref=e169]:
              - listitem [ref=e170]:
                - strong [ref=e171]: "Simulation Method:"
                - text: Choose between GBM, SRW, or Historical Shuffle.
              - listitem [ref=e172]:
                - strong [ref=e173]: "Regime Filter:"
                - text: Filter historical data by Trend (SMA) or Momentum (RSI).
              - listitem [ref=e174]:
                - strong [ref=e175]: "Historical Lookback:"
                - text: The number of past bars used to calculate volatility.
              - listitem [ref=e176]:
                - strong [ref=e177]: "Projection Length:"
                - text: How many bars into the future the paths extend.
              - listitem [ref=e178]:
                - strong [ref=e179]: "Simulation Count:"
                - text: Number of individual paths to calculate (max 200).
              - listitem [ref=e180]:
                - strong [ref=e181]: "Volatility Multiplier:"
                - text: Scales the historical volatility to simulate "stress-test" scenarios.
              - listitem [ref=e182]:
                - strong [ref=e183]: "Anchor Mode:"
                - text: When enabled, locks the projection to update only at specific intervals.
            - text: 🔹
            - strong [ref=e184]: Style
            - list [ref=e185]:
              - listitem [ref=e186]:
                - strong [ref=e187]: "Path Percentiles:"
                - text: Adjust the thresholds for coloring the "Top" and "Bottom" path groups.
              - listitem [ref=e188]:
                - strong [ref=e189]: "Colors:"
                - text: Customize the colors for bullish, bearish, and neutral paths, as well as the average projection line.
              - listitem [ref=e190]:
                - strong [ref=e191]: "Show S/R Levels:"
                - text: Toggles the visibility of the horizontally fading Support and Resistance zones.
            - text: 🔹
            - strong [ref=e192]: Dashboard
            - list [ref=e193]:
              - listitem [ref=e194]:
                - strong [ref=e195]: "Show Dashboard:"
                - text: Toggles the statistical metrics table.
              - listitem [ref=e196]:
                - strong [ref=e197]: "Next Candle Prediction:"
                - text: Enables the "Forecasted Candle" visual, which uses the 1-bar-ahead expected mean and distribution to render a text-based candlestick on the dashboard.
