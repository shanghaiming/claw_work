{% extends 'dashboard/base.html' %}

{% block title %}策略回测 - Quant Dashboard{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2><i class="fas fa-play-circle"></i> 策略回测</h2>
        <p class="text-muted">选择策略和股票参数，运行历史回测</p>
    </div>
</div>

<!-- 回测表单 -->
<div class="row mb-4">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><h5 class="mb-0"><i class="fas fa-sliders-h"></i> 回测参数</h5></div>
            <div class="card-body">
                <form id="backtestForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">策略 *</label>
                            <select class="form-select" id="strategySelect" required>
                                <option value="">-- 选择策略 --</option>
                                {% for s in strategies %}
                                    {% if s.status == 'loaded' %}
                                    <option value="{{ s.name }}">{{ s.name }} ({{ s.class_name }})</option>
                                    {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">股票代码 *</label>
                            <input type="text" class="form-control" id="symbolInput" placeholder="如 000001.SZ" value="000001.SZ" required>
                            <small class="text-muted" id="symbolHint"></small>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">数据频率</label>
                            <select class="form-select" id="timeframeSelect">
                                <option value="daily">日线</option>
                                <option value="weekly">周线</option>
                                <option value="5min">5分钟</option>
                                <option value="30min">30分钟</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">开始日期</label>
                            <input type="date" class="form-control" id="startDate" value="2024-01-01">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">结束日期</label>
                            <input type="date" class="form-control" id="endDate" value="2024-12-31">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">初始资金</label>
                            <input type="number" class="form-control" id="initialCash" value="100000">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg" id="runBtn">
                        <i class="fas fa-play"></i> 运行回测
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 结果区域 -->
<div id="resultsSection" class="d-none">
    <!-- 绩效摘要 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <div class="stat-number" id="resTotalReturn">--</div>
                <div class="stat-label">总收益率</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                <div class="stat-number" id="resSharpe">--</div>
                <div class="stat-label">夏普比率</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #eb3349, #f45c43);">
                <div class="stat-number" id="resMaxDrawdown">--</div>
                <div class="stat-label">最大回撤</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);">
                <div class="stat-number" id="resTradeCount">--</div>
                <div class="stat-label">交易次数</div>
            </div>
        </div>
    </div>

    <!-- 资金曲线 -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header"><h5 class="mb-0"><i class="fas fa-chart-line"></i> 资金曲线</h5></div>
                <div class="card-body">
                    <div class="chart-container"><canvas id="equityChart"></canvas></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header"><h5 class="mb-0"><i class="fas fa-chart-bar"></i> 绩效指标</h5></div>
                <div class="card-body">
                    <table class="table table-sm">
                        <tr><td>年化收益</td><td class="text-end fw-bold" id="resAnnualReturn">--</td></tr>
                        <tr><td>最终净值</td><td class="text-end fw-bold" id="resFinalEquity">--</td></tr>
                        <tr><td>索提诺比率</td><td class="text-end fw-bold" id="resSortino">--</td></tr>
                        <tr><td>交易笔数</td><td class="text-end fw-bold" id="resTradeCount2">--</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 交易记录 -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header"><h5 class="mb-0"><i class="fas fa-list-ol"></i> 交易记录</h5></div>
                <div class="card-body">
                    <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                        <table class="table table-hover table-sm">
                            <thead><tr><th>时间</th><th>操作</th><th>股票</th><th>价格</th><th>数量</th><th>盈亏</th></tr></thead>
                            <tbody id="tradesTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 加载/错误提示 -->
<div id="loadingSection" class="d-none text-center my-5">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    <p class="mt-3">正在运行回测...</p>
</div>
<div id="errorSection" class="d-none">
    <div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> <span id="errorMsg"></span></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let equityChartInstance = null;

// Pre-select strategy from URL param
document.addEventListener('DOMContentLoaded', function() {
    const params = new URLSearchParams(window.location.search);
    const preselect = params.get('strategy');
    if (preselect) {
        const sel = document.getElementById('strategySelect');
        if (sel) sel.value = preselect;
    }
});

document.getElementById('backtestForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const strategy = document.getElementById('strategySelect').value;
    const symbol = document.getElementById('symbolInput').value.trim();
    if (!strategy || !symbol) return alert('请选择策略和输入股票代码');

    const payload = {
        strategy_name: strategy,
        symbol: symbol,
        timeframe: document.getElementById('timeframeSelect').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        initial_cash: parseFloat(document.getElementById('initialCash').value) || 100000,
        params: {}
    };

    document.getElementById('resultsSection').classList.add('d-none');
    document.getElementById('errorSection').classList.add('d-none');
    document.getElementById('loadingSection').classList.remove('d-none');
    document.getElementById('runBtn').disabled = true;

    try {
        const resp = await fetch('{% url "dashboard:run_backtest" %}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await resp.json();

        if (data.error) {
            document.getElementById('loadingSection').classList.add('d-none');
            document.getElementById('errorSection').classList.remove('d-none');
            document.getElementById('errorMsg').textContent = data.error;
            return;
        }

        // Populate results
        const fmt = (v, pct) => {
            if (v === null || v === undefined) return '--';
            return pct ? (v * 100).toFixed(2) + '%' : v.toLocaleString(undefined, {maximumFractionDigits: 2});
        };

        document.getElementById('resTotalReturn').textContent = fmt(data.summary.total_return, true);
        document.getElementById('resSharpe').textContent = fmt(data.risk_return.sharpe_ratio);
        document.getElementById('resMaxDrawdown').textContent = fmt(data.drawdown.max_drawdown, true);
        document.getElementById('resTradeCount').textContent = data.summary.trade_count;
        document.getElementById('resAnnualReturn').textContent = fmt(data.summary.annualized_return, true);
        document.getElementById('resFinalEquity').textContent = fmt(data.summary.final_equity);
        document.getElementById('resSortino').textContent = fmt(data.risk_return.sortino_ratio);
        document.getElementById('resTradeCount2').textContent = data.summary.trade_count;

        // Equity curve chart
        if (equityChartInstance) equityChartInstance.destroy();
        const ecData = data.equity_curve || [];
        const ctx = document.getElementById('equityChart').getContext('2d');
        equityChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ecData.map(d => d.timestamp ? d.timestamp.slice(0, 10) : ''),
                datasets: [{
                    label: '资金曲线',
                    data: ecData.map(d => d.value),
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13,110,253,0.1)',
                    fill: true, tension: 0.3, pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Trades table
        const tbody = document.getElementById('tradesTable');
        tbody.innerHTML = '';
        (data.trades || []).forEach(t => {
            const profitClass = t.profit > 0 ? 'text-success' : t.profit < 0 ? 'text-danger' : '';
            tbody.innerHTML += `<tr>
                <td>${t.timestamp ? t.timestamp.slice(0, 10) : ''}</td>
                <td><span class="badge ${t.action === 'buy' ? 'bg-success' : 'bg-danger'}">${t.action}</span></td>
                <td>${t.symbol}</td>
                <td>${fmt(t.price)}</td>
                <td>${t.shares}</td>
                <td class="${profitClass}">${t.profit > 0 ? '+' : ''}${fmt(t.profit)}</td>
            </tr>`;
        });

        document.getElementById('loadingSection').classList.add('d-none');
        document.getElementById('resultsSection').classList.remove('d-none');
    } catch (err) {
        document.getElementById('loadingSection').classList.add('d-none');
        document.getElementById('errorSection').classList.remove('d-none');
        document.getElementById('errorMsg').textContent = '网络错误: ' + err.message;
    } finally {
        document.getElementById('runBtn').disabled = false;
    }
});
</script>
{% endblock %}
